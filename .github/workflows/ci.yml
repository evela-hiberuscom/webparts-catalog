name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Check shared package lockfile entries
        run: npm run check:locks

      - name: Check pinned project dependency ranges
        run: npm run check:pinned-deps

      - name: Scan for high-confidence secrets
        run: npm run check:secrets

      - name: Run audit remediation static checks
        run: npm run check:audit-remediation

  build-test:
    name: Build and test changed projects
    runs-on: ubuntu-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Build and test affected SPFx projects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: npm run ci:projects -- --base "$BASE_SHA" --head "$HEAD_SHA"
